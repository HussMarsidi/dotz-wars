<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>dotz-wars</title>
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				background: #111;
				font-family: "Segoe UI", system-ui, sans-serif;
			}
			#app {
				position: relative;
				width: 100%;
				height: 100%;
			}
			#app canvas {
				display: block;
				width: 100%;
				height: 100%;
			}
			.toolbar {
				position: absolute;
				top: 12px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 2;
				display: flex;
				gap: 8px;
				padding: 6px;
				border-radius: 8px;
				background: rgba(20, 24, 18, 0.82);
				border: 1px solid rgba(255, 255, 255, 0.12);
				backdrop-filter: blur(6px);
			}
			.toolbar button {
				appearance: none;
				border: 1px solid transparent;
				border-radius: 6px;
				padding: 8px 14px;
				background: transparent;
				color: #e8efe4;
				font: inherit;
				font-size: 13px;
				cursor: pointer;
			}
			.toolbar button:hover {
				background: rgba(255, 255, 255, 0.08);
			}
			.toolbar button.is-active {
				background: rgba(79, 195, 247, 0.22);
				border-color: rgba(79, 195, 247, 0.55);
				color: #fff;
			}
			#app[data-pointer-mode="pan"] canvas {
				cursor: grab;
			}
			#app[data-pointer-mode="pan"] canvas:active {
				cursor: grabbing;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
